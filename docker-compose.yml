services:
  db:
    image: pgvector/pgvector:pg17
    container_name: syllabus_db
    environment:
      POSTGRES_USER: syllabus
      POSTGRES_PASSWORD: syllabus
      POSTGRES_DB: syllabus_chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syllabus -d syllabus_chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
